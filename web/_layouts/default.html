<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>
  {{ content }}
  <footer>
    <div class="footer-links">
      <a href="{{ site.baseurl }}/">Home</a>
      <a href="https://github.com/{{ site.github_username }}/football-analytics" target="_blank" rel="noopener">GitHub</a>
      <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener">X / Twitter</a>
    </div>
    <p>Analysis by {{ site.author }} · Data: SportsMonks, Understat, FBRef</p>
  </footer>
</body>
</html>
