---
layout: default
---
<main>
  <a href="{{ site.baseurl }}/" class="back-link">← All analysis</a>
  <div class="post-header">
    <div class="post-meta">
      <span class="series-tag">Thread {{ page.thread_num }}</span>
      {{ page.date | date: "%B %-d, %Y" }} · {{ page.data_source }}
    </div>
    <h1>{{ page.title }}</h1>
  </div>
  <div class="post-body">
    {{ content }}
  </div>
</main>
